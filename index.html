<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Premium | WhatsApp</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold-light: #f3e0aa;
            --gold-primary: #d4af37;
            --gold-dark: #aa820a;
            --whatsapp-color: #25d366;
            --whatsapp-dark: #128c7e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, rgba(10, 15, 29, 0.75), rgba(5, 8, 16, 0.9)),
                url('https://images.unsplash.com/photo-1542314831-c53cd453a5ce?q=80&w=2070&auto=format&fit=crop') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        /* Glassmorphism Refinado */
        .glass-card {
            position: relative;
            background: rgba(18, 24, 38, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 48px 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.65),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: floatUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow: hidden;
        }

        /* Brilho Dourado Sutil no Fundo do Card */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
        }

        @keyframes floatUp {
            from {
                opacity: 0;
                transform: translateY(25px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Badge de Luxo */
        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--gold-light);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 30%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 400;
        }

        /* Input Container Modernizado */
        .input-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #cbd5e1;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 44px 14px 16px;
            font-size: 15px;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            outline: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        /* Estados de Hover e Foco */
        .input-wrapper input:hover {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.06);
        }

        .input-wrapper input:focus {
            border-color: var(--gold-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
        }

        .input-wrapper i {
            position: absolute;
            right: 16px;
            color: rgba(255, 255, 255, 0.35);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .input-wrapper input:focus~i {
            color: var(--gold-primary);
        }

        /* Ajuste do Seletor de Data */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        /* Botão Premium com Transição de Gradiente */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--whatsapp-color), var(--whatsapp-dark));
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 28px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(37, 211, 102, 0.35);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px -4px rgba(37, 211, 102, 0.45);
            filter: brightness(1.05);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit i {
            font-size: 18px;
        }

        /* Footer do Card */
        .card-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Responsividade para telas menores */
        @media (max-width: 480px) {
            .glass-card {
                padding: 32px 24px;
            }

            .header h1 {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="glass-card">
        <div class="header">
            <span class="brand-badge">
                <i class="fa-solid fa-star"></i> Estadia Hotel
            </span>
            <h1>Hotel Arcasias</h1>
            <p>Confirmação Rápida de Reserva</p>
        </div>

        <form id="reservaForm">
            <div class="input-group">
                <label for="nome">Nome do Hóspede</label>
                <div class="input-wrapper">
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required
                        autocomplete="name">
                    <i class="fa-regular fa-user"></i>
                </div>
            </div>

            <div class="input-group">
                <label for="numero">WhatsApp</label>
                <div class="input-wrapper">
                    <input type="tel" id="numero" name="numero" placeholder="(00) 00000-0000" required
                        autocomplete="tel">
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
            </div>

            <div class="input-group">
                <label for="data">Data de Check-in</label>
                <div class="input-wrapper">
                    <input type="date" id="data" name="data" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fa-brands fa-whatsapp"></i>
                <span>Confirmar via WhatsApp</span>
            </button>

            <div class="card-footer">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Comunicação direta & 100% segura</span>
            </div>
        </form>
    </div>

    <script>
        // Trava a seleção de data mínima para a data atual
        const dataInput = document.getElementById('data');
        const hoje = new Date().toISOString().split('T')[0];
        dataInput.min = hoje;

        // Máscara dinâmica de telefone
        const numeroInput = document.getElementById('numero');
        numeroInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);

            if (value.length > 10) {
                value = value.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
            } else if (value.length > 6) {
                value = value.replace(/^(\d{2})(\d{4})(\d{0,4})$/, '($1) $2-$3');
            } else if (value.length > 2) {
                value = value.replace(/^(\d{2})(\d{0,5})$/, '($1) $2');
            }
            e.target.value = value;
        });

        // Envio do formulário
        document.getElementById("reservaForm").addEventListener("submit", function (event) {
            event.preventDefault();

            const btn = document.querySelector('.btn-submit');
            const nome = document.getElementById("nome").value.trim();
            const numeroBruto = document.getElementById("numero").value.replace(/\D/g, "");
            const dataVal = document.getElementById("data").value;

            // Insere código do país (55) se o usuário digitou apenas DDD + número
            const numeroFinal = numeroBruto.length <= 11 ? `55${numeroBruto}` : numeroBruto;

            // Formatação de data (DD/MM/AAAA)
            const [ano, mes, dia] = dataVal.split('-');
            const dataFormatada = `${dia}/${mes}/${ano}`;

            // Mensagem personalizada
            const mensagem = `Olá, *${nome}*!\n\nÉ um prazer recebê-lo(a) no *The Grand Hotel* ✨\n\nSua solicitação de reserva para o dia *${dataFormatada}* foi recebida com sucesso.\nNossa equipe já está preparando os detalhes da sua estadia.`;

            const url = `https://wa.me/${numeroFinal}?text=${encodeURIComponent(mensagem)}`;

            // Feedback visual no botão
            btn.style.opacity = '0.8';
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>Redirecionando...</span>';

            setTimeout(() => {
                window.open(url, "_blank");
                btn.style.opacity = '1';
                btn.innerHTML = '<i class="fa-brands fa-whatsapp"></i> <span>Confirmar via WhatsApp</span>';
                document.getElementById("reservaForm").reset();
            }, 600);
        });
    </script>
</body>

</html>
