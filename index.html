<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Acácias | Reserva via WhatsApp</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Paleta Oficial extraída do logotipo e identidade Hotel Acácias */
            --acacias-green-dark: #1E381E;
            --acacias-green-primary: #2D5A27;
            --acacias-green-light: #488241;
            --acacias-yellow: #E9C46A;
            --acacias-gold: #DDA15E;
            --acacias-wine: #9B3248;
            --acacias-teal: #2A6F97;
            
            --whatsapp-green: #25D366;
            --whatsapp-dark: #128C7E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, rgba(15, 28, 18, 0.82), rgba(10, 18, 12, 0.92)),
                        url('https://images.unsplash.com/photo-1542314831-c53cd453a5ce?q=80&w=2070&auto=format&fit=crop') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        /* Glassmorphism alinhado à estética orgânica e elegante do Hotel */
        .glass-card {
            position: relative;
            background: rgba(22, 36, 24, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(233, 196, 106, 0.2);
            border-radius: 28px;
            padding: 44px 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7),
                        inset 0 1px 0 rgba(255, 255, 255, 0.15);
            animation: floatUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow: hidden;
        }

        /* Iluminação radial suave em tom Amarelo/Dourado Acácias */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(233, 196, 106, 0.18) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
        }

        @keyframes floatUp {
            from {
                opacity: 0;
                transform: translateY(25px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Selo / Badge de Excelência */
        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(233, 196, 106, 0.12);
            border: 1px solid rgba(233, 196, 106, 0.35);
            color: var(--acacias-yellow);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 40%, var(--acacias-yellow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        /* Inputs Estruturados */
        .input-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.6px;
            color: var(--acacias-yellow);
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 44px 14px 16px;
            font-size: 15px;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            outline: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        /* Foco com o tom verde/dourado das Acácias */
        .input-wrapper input:hover {
            border-color: rgba(233, 196, 106, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-wrapper input:focus {
            border-color: var(--acacias-yellow);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(233, 196, 106, 0.18);
        }

        .input-wrapper i {
            position: absolute;
            right: 16px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .input-wrapper input:focus ~ i {
            color: var(--acacias-yellow);
        }

        /* Ícone de data customizado */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        /* Botão Principal com Gradiente do WhatsApp em harmonia com os tons do Hotel */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 28px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(37, 211, 102, 0.35);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px -4px rgba(37, 211, 102, 0.5);
            filter: brightness(1.05);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit i {
            font-size: 18px;
        }

        /* Rodapé do Card com Slogan Oficial */
        .card-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 32px 22px;
            }

            .header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>

    <div class="glass-card">
        <div class="header">
            <span class="brand-badge">
                <i class="fa-solid fa-leaf"></i> Hotel Acácias
            </span>
            <h1>Hotel Acácias</h1>
            <p>Excelência em Hospedagem</p>
        </div>

        <form id="reservaForm">
            <div class="input-group">
                <label for="nome">Nome do Hóspede</label>
                <div class="input-wrapper">
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required autocomplete="name">
                    <i class="fa-regular fa-user"></i>
                </div>
            </div>

            <div class="input-group">
                <label for="numero">WhatsApp para Contato</label>
                <div class="input-wrapper">
                    <input type="tel" id="numero" name="numero" placeholder="(00) 00000-0000" required autocomplete="tel">
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
            </div>

            <div class="input-group">
                <label for="data">Data de Check-in</label>
                <div class="input-wrapper">
                    <input type="date" id="data" name="data" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fa-brands fa-whatsapp"></i>
                <span>Confirmar via WhatsApp</span>
            </button>

            <div class="card-footer">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Atendimento direto & 100% seguro</span>
            </div>
        </form>
    </div>

    <script>
        // Trava a seleção de data mínima para a data atual
        const dataInput = document.getElementById('data');
        const hoje = new Date().toISOString().split('T')[0];
        dataInput.min = hoje;

        // Máscara dinâmica de telefone
        const numeroInput = document.getElementById('numero');
        numeroInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);

            if (value.length > 10) {
                value = value.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
            } else if (value.length > 6) {
                value = value.replace(/^(\d{2})(\d{4})(\d{0,4})$/, '($1) $2-$3');
            } else if (value.length > 2) {
                value = value.replace(/^(\d{2})(\d{0,5})$/, '($1) $2');
            }
            e.target.value = value;
        });

        // Envio do formulário
        document.getElementById("reservaForm").addEventListener("submit", function (event) {
            event.preventDefault();

            const btn = document.querySelector('.btn-submit');
            const nome = document.getElementById("nome").value.trim();
            const numeroBruto = document.getElementById("numero").value.replace(/\D/g, "");
            const dataVal = document.getElementById("data").value;

            // Insere código do país (55) se o usuário digitou apenas DDD + número
            const numeroFinal = numeroBruto.length <= 11 ? `55${numeroBruto}` : numeroBruto;

            // Formatação de data (DD/MM/AAAA)
            const [ano, mes, dia] = dataVal.split('-');
            const dataFormatada = `${dia}/${mes}/${ano}`;

            // Mensagem personalizada do Hotel Acácias
            const mensagem = `Olá, *${nome}*!\n\nÉ um prazer recebê-lo(a) no *Hotel Acácias* ✨\n_Excelência em Hospedagem_\n\nSua solicitação de reserva para a data *${dataFormatada}* foi iniciada.\nNossa equipe verificará a disponibilidade das acomodações e retornará em breve!`;

            const url = `https://wa.me/${numeroFinal}?text=${encodeURIComponent(mensagem)}`;

            // Feedback visual no botão
            btn.style.opacity = '0.85';
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>Redirecionando...</span>';

            setTimeout(() => {
                window.open(url, "_blank");
                btn.style.opacity = '1';
                btn.innerHTML = '<i class="fa-brands fa-whatsapp"></i> <span>Confirmar via WhatsApp</span>';
                document.getElementById("reservaForm").reset();
            }, 600);
        });
    </script>
</body>

</html>
